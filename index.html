<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PBS 컬러강점 진로진단 · 학생용</title>
<style>
:root{
  --red:#FF3366;--red-bg:#FFF0F4;--yellow:#F5A623;--yellow-bg:#FFF8E6;
  --green:#00A878;--green-bg:#E6F8F1;--blue:#0077B6;--blue-bg:#E6F4FB;
  --ink:#1C1A2E;--soft:#524F6A;--muted:#8A87A6;--line:#ECE8F5;
  --bg:#FBFAFE;--surface:#fff;--r:18px;
  --brand:linear-gradient(135deg,#1F6FB2,#3E5CC8 55%,#6A4DBE);
  --font:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,system-ui,'Apple SD Gothic Neo',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.75;-webkit-font-smoothing:antialiased}
.wrap{max-width:600px;margin:0 auto;padding:0 16px 60px}
.top{background:var(--brand);color:#fff;border-radius:0 0 26px 26px;padding:26px 20px 30px;text-align:center}
.top .badge{display:inline-block;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);padding:5px 13px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:10px}
.top h1{font-size:22px;font-weight:900;letter-spacing:-.02em}
.top p{font-size:13.5px;opacity:.95;margin-top:6px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px 18px;margin:14px 0;box-shadow:0 4px 14px rgba(80,60,140,.06)}
.card h2{font-size:19px;font-weight:900;margin-bottom:6px}
.card .sub{color:var(--soft);font-size:14px;margin-bottom:14px}
.screen{display:none}.screen.active{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.score-row{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:14px;margin-bottom:10px}
.score-row .dot{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:15px;flex-shrink:0}
.score-row .lab{flex:1}.score-row .lab b{display:block;font-size:16px;font-weight:900}
.score-row .lab span{font-size:12px;color:var(--soft);font-weight:700}
.score-row input{width:88px;height:52px;text-align:center;font-size:22px;font-weight:900;font-family:var(--font);border:2px solid var(--line);border-radius:12px;background:#fff;color:var(--ink)}
.score-row input:focus{outline:none}
.score-row[data-c="RED"]{background:var(--red-bg)} .score-row[data-c="RED"] input:focus{border-color:var(--red)} .score-row[data-c="RED"] .lab b{color:var(--red)} .score-row[data-c="RED"] .dot{background:var(--red)}
.score-row[data-c="YELLOW"]{background:var(--yellow-bg)} .score-row[data-c="YELLOW"] input:focus{border-color:var(--yellow)} .score-row[data-c="YELLOW"] .lab b{color:#C9821A} .score-row[data-c="YELLOW"] .dot{background:var(--yellow)}
.score-row[data-c="GREEN"]{background:var(--green-bg)} .score-row[data-c="GREEN"] input:focus{border-color:var(--green)} .score-row[data-c="GREEN"] .lab b{color:var(--green)} .score-row[data-c="GREEN"] .dot{background:var(--green)}
.score-row[data-c="BLUE"]{background:var(--blue-bg)} .score-row[data-c="BLUE"] input:focus{border-color:var(--blue)} .score-row[data-c="BLUE"] .lab b{color:var(--blue)} .score-row[data-c="BLUE"] .dot{background:var(--blue)}
.hint{font-size:12.5px;color:var(--muted);text-align:center;margin:4px 0 12px}
.btn{display:block;width:100%;border:none;border-radius:999px;padding:17px;font-size:17px;font-weight:900;font-family:var(--font);cursor:pointer;color:#fff;background:var(--brand);box-shadow:0 8px 20px rgba(50,70,160,.32);transition:transform .15s}
.btn:active{transform:scale(.98)}
.btn.ghost{background:#fff;color:#3E5CC8;border:2px solid #D6DEF6;box-shadow:none}
.remain{text-align:center;font-size:13px;color:var(--soft);font-weight:700;margin-top:10px}
.hero{border-radius:22px;padding:30px 20px;text-align:center;color:#fff}
.hero .kicker{font-size:13px;font-weight:800;opacity:.9;letter-spacing:.08em}
.hero h2{font-size:26px;font-weight:900;margin:4px 0}
.hero .stitle{font-size:14.5px;font-weight:700;opacity:.97}
.hero .quote{font-size:14.5px;font-style:italic;opacity:.95;margin-top:12px;border-top:1px solid rgba(255,255,255,.28);padding-top:12px}
.bar{display:flex;align-items:center;gap:10px;margin:9px 0}
.bar .bd{width:26px;height:26px;border-radius:8px;color:#fff;font-weight:900;font-size:11px;display:grid;place-items:center;flex-shrink:0}
.bar .bt{flex:1}
.bar .bt .n{display:flex;justify-content:space-between;font-size:12.5px;font-weight:800;margin-bottom:3px}
.bar .track{height:12px;background:#F0ECF8;border-radius:999px;overflow:hidden}
.bar .fill{height:100%;border-radius:999px}
.sec{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}
.sec:first-child{border-top:none;padding-top:0;margin-top:0}
.sec h3{font-size:16.5px;font-weight:900;margin-bottom:8px;display:flex;align-items:center;gap:7px}
.sec p{font-size:14.5px;color:#37324a;line-height:1.9;margin-bottom:8px}
.sec ul{list-style:none}
.sec li{font-size:14.5px;color:#37324a;padding:5px 0 5px 24px;position:relative;line-height:1.65}
.sec li::before{content:"⭐";position:absolute;left:0;font-size:12px;top:7px}
.mlist{list-style:none;margin-top:4px}
.mlist li{font-size:14.3px;color:#37324a;padding:8px 0 8px 30px;position:relative;line-height:1.7;border-bottom:1px dashed var(--line)}
.mlist li:last-child{border-bottom:none}
.mlist li::before{content:"📌";position:absolute;left:0;top:8px;font-size:13px}
.nlist{list-style:none;counter-reset:n;margin-top:4px}
.nlist li{font-size:14.3px;color:#37324a;padding:8px 0 8px 34px;position:relative;line-height:1.7}
.nlist li::before{counter-increment:n;content:counter(n);position:absolute;left:0;top:7px;width:22px;height:22px;background:var(--blue);color:#fff;border-radius:50%;font-size:12px;font-weight:900;display:grid;place-items:center}
.tip{background:#EAF2FC;border-left:3px solid var(--blue);border-radius:8px;padding:11px 13px;font-size:13.8px;color:#274a6b;line-height:1.8;margin-top:8px}
.worry{background:#FFF6E9;border-left:3px solid var(--yellow);border-radius:10px;padding:13px 15px;margin-top:6px}
.worry .q{font-size:14px;font-weight:800;color:#9A6B12;margin-bottom:5px}
.worry p{font-size:14px;color:#5b4a2a;line-height:1.85;margin:0}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chips span{background:#EAF6FF;color:#0F5E8C;font-size:13.5px;font-weight:800;padding:8px 13px;border-radius:999px}
.chips.act span{background:#F4F0FB;color:#5A3E8C}
.affirm{background:#EEF3FC;border-radius:14px;padding:15px 16px;text-align:center;font-size:16px;font-weight:800;color:#2E4A8C;margin-top:16px}
.field{margin-bottom:14px}
.field label{display:block;font-size:14.5px;font-weight:800;margin-bottom:7px}
.field textarea{width:100%;min-height:90px;font-family:var(--font);font-size:15px;padding:12px;border:2px solid var(--line);border-radius:12px;resize:vertical}
.field textarea:focus{outline:none;border-color:#3E5CC8}
.stars{font-size:36px;letter-spacing:6px;cursor:pointer;user-select:none;text-align:center}.stars span{color:#E3DFF0}
#imgprev img{max-width:100%;max-height:220px;border-radius:12px;margin-top:8px;border:1px solid var(--line)}
.more{background:linear-gradient(135deg,#16294a,#3E5CC8);color:#fff;border-radius:20px;padding:24px 20px;margin-top:16px;text-align:center}
.more .k{font-size:12px;font-weight:800;opacity:.85;letter-spacing:.15em;margin-bottom:8px}
.more h3{font-size:19px;font-weight:900;margin-bottom:6px}.more p{font-size:13.5px;opacity:.95;line-height:1.6;margin-bottom:14px}
.more a{display:block;text-decoration:none;font-weight:900;font-size:14.5px;padding:14px;border-radius:12px;margin-top:9px}
.more a.p{background:#FFD56B;color:#3A2A5B}.more a.o{background:transparent;color:#fff;border:1.6px solid rgba(255,255,255,.55)}
.foot{text-align:center;font-size:12px;color:var(--muted);margin-top:22px;line-height:1.6}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#2A2540;color:#fff;padding:12px 20px;border-radius:999px;font-size:14px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .25s;z-index:99}
.toast.on{opacity:1}
.print-only{display:none}
@media print{ body{background:#fff}.no-print{display:none!important}.print-only{display:block!important}
  .wrap{max-width:100%;padding:0}.card{box-shadow:none;border:1px solid #e5e0f0;break-inside:avoid;margin:6px 0}
  .hero,.bar .fill,.chips span,.more,.affirm,.tip,.worry,.nlist li::before{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{size:A4;margin:12mm} }
</style>
</head>
<body>
<div class="top">
  <div class="badge">PBS 컬러강점 진로진단 · 48문항</div>
  <h1>나의 진로 컬러강점 결과</h1>
  <p>종이 진단지의 <b>4색 엔진 점수</b>를 넣으면<br>진로·성격·강점·공부법을 자세히 알려줘요</p>
</div>
<div class="wrap">
  <section id="s-input" class="screen active no-print">
    <div class="card">
      <h2>✏️ 4색 엔진 점수를 입력하세요</h2>
      <p class="sub">종이 진단지에서 <b>기어 3개 합계로 구한 엔진 점수</b>를 색깔별로 그대로 적어요. 하나 넣으면 자동으로 다음 칸으로 넘어가요.</p>
      <div id="score-list"></div>
      <div class="remain" id="remain">4색 엔진 점수를 모두 넣어주세요</div>
    </div>
    <button class="btn" onclick="showResult()">결과 보기 →</button>
    <p class="hint">가장 높은 점수의 색이 나의 1순위 엔진이에요.</p>
  </section>
  <section id="s-result" class="screen"></section>
</div>
<div class="toast" id="toast"></div>
<script>
const ORDER=['RED','YELLOW','GREEN','BLUE'];
const S = {
  RED:{name:'RED 추진 엔진',shortName:'추진',color:'#FF3366',type:'앞장서서 실행하는 리더형',quote:'일단 부딪히며 배운다',
    tags:['리더십','실행력','도전','목표 집중','주도성','경쟁심'],
    personality:'목표가 생기면 바로 움직이고, 경쟁과 도전에서 힘이 나는 실행형이에요. 결정이 빠르고 앞장서길 좋아하며, 어려운 상황에서 오히려 에너지가 솟아요.',
    strengths:['생각을 바로 행동으로 옮기는 강한 실행력','팀을 이끌고 결정을 내리는 리더십','어려움에 굴하지 않는 도전 정신','목표를 향해 끝까지 밀어붙이는 집중력','위기 상황에서 침착하게 결단하는 힘','새로운 일을 두려워하지 않는 용기'],
    study:'목표와 마감을 정해 "미션"처럼 도전할 때 집중이 확 올라가요. 개념을 오래 외우기보다 문제풀이·기출·모의고사로 실전 감각을 쌓고 성취감을 얻는 방식이 잘 맞아요.',
    studyMethods:['오늘 할 분량을 "미션"으로 정하고 클리어하듯 끝내기','개념 정리는 짧게, 문제풀이·기출로 실전 감각 쌓기','25분 몰입 + 5분 휴식(뽀모도로)으로 짧고 강하게','친구와 점수·풀이 속도 경쟁으로 동기 만들기','끝낼 때마다 스스로 작은 보상 주기'],
    subjectTips:'암기 과목은 "퀴즈 배틀"처럼 문제로 바꿔 풀고, 수학·과학은 많은 문제를 빠르게 풀며 유형을 몸에 익혀요. 긴 지문은 핵심만 먼저 훑고 문제부터 도전하는 방식이 잘 맞아요.',
    examTip:'시험 전엔 "실전 모의고사 → 오답 정리" 사이클을 반복하고, 목표 점수를 눈에 보이게 적어두면 집중력이 올라가요.',
    friends:'앞장서서 모둠·팀을 이끌고 분위기를 주도해요. 내 뜻대로만 하기보다 친구 의견을 끝까지 듣고 배려하면, 모두가 따르는 진짜 신뢰받는 리더가 됩니다.',
    majorWhy:'앞장서서 이끌고 목표를 이루는 걸 좋아해서, 사람·조직·프로젝트를 움직이는 계열에서 빛나요.',
    majors:['경영·창업','경찰·군·소방','체육·스포츠','마케팅·영업','정치외교·행정','스포츠경영','호텔·관광경영'],
    activities:['학생회·동아리 회장','대회·공모전 도전','프로젝트 팀장'],
    worryQ:'"하고 싶은 게 자꾸 바뀌어요"',
    worryA:'괜찮아요. 추진형은 여러 도전을 통해 진짜 원하는 걸 찾아가는 타입이에요. 지금은 "결정"보다 "많이 시도"가 정답이에요. 작은 도전을 여러 개 해보면 방향이 저절로 좁혀져요.',
    actions:['관심 분야 대회·공모전·동아리에 하나 도전하기','학생회·팀 리더 역할을 맡아 리더십 경험 쌓기','창업가·운동선수 등 관심 직업인의 인터뷰·브이로그 찾아보기','한 달 목표를 정해 이뤄보고 성취 경험을 기록하기'],
    grow:'급한 마음에 서두르다 실수하거나, 지는 걸 힘들어할 수 있어요. 속도 조절과 경청, "실패도 배움"이라는 태도를 익히면 리더십이 두 배로 단단해져요.',
    cheer:'나는 목표를 향해 앞장서는 실행하는 리더예요!'},
  YELLOW:{name:'YELLOW 관계 엔진',shortName:'관계',color:'#F5A623',type:'사람과 통하는 소통·표현형',quote:'함께할 때 가장 빛난다',
    tags:['소통','표현력','공감','사교성','긍정 에너지','창의'],
    personality:'사람들과 어울리며 에너지를 얻고, 밝게 표현하며 분위기를 이끄는 소통형이에요. 새로운 친구도 금방 사귀고 아이디어가 톡톡 나와요.',
    strengths:['생각과 감정을 생동감 있게 전하는 소통·발표력','상대 마음을 잘 알아주는 따뜻한 공감','분위기를 밝히는 긍정 에너지와 영향력','톡톡 튀는 창의적 표현','누구와도 친해지는 폭넓은 사교성','사람들을 연결하고 이끄는 힘'],
    study:'혼자보다 친구와 토론하고 설명하며 배우는 협동학습이 최고예요. 배운 내용을 남에게 설명하거나 발표하면 이해가 확 깊어지고, 스터디그룹에서 힘이 나요.',
    studyMethods:['친구와 서로 문제 내고 설명하는 짝·그룹 공부','배운 내용을 "가르치듯" 말로 설명해보기','스토리·이미지·색깔로 재미있게 정리하기','작은 목표를 이룰 때마다 칭찬·보상으로 동기 유지','계획을 친구와 공유해 함께 지키기'],
    subjectTips:'암기 과목은 친구와 퀴즈로, 어려운 개념은 이야기·비유로 바꿔 이해하면 쏙쏙 들어와요. 발표·토론·글쓰기가 있는 과목에서 특히 강점을 발휘해요.',
    examTip:'혼자 조용히보다 스터디그룹에서 서로 점검하고, 계획을 친구와 공유해 함께 지키면 끝까지 해내요.',
    friends:'누구와도 잘 어울리는 분위기 메이커예요. 신날 때도 친구 이야기를 끝까지 듣고 조용한 친구도 먼저 챙기면, 신뢰가 더 깊어져요.',
    majorWhy:'사람과 소통하고 표현하는 걸 좋아해서, 사람을 만나고 가르치고 알리는 계열에서 빛나요.',
    majors:['교육·사범','방송·언론·미디어','광고·홍보·마케팅','관광·서비스','심리·상담','공연·예술','사회·커뮤니케이션'],
    activities:['발표·토론·MC','방송부·동아리','봉사·행사 기획'],
    worryQ:'"좋아하는 건 많은데 하나로 못 정하겠어요"',
    worryA:'관계형은 호기심이 넓어서 그래요. 억지로 하나만 고르지 말고, 여러 활동을 경험하며 "사람들과 무엇을 할 때 가장 즐거운지" 관찰해 보세요. 그 지점이 진로의 힌트예요.',
    actions:['발표·방송·봉사·행사 기획 등 사람과 함께하는 활동 경험하기','관심 직업인 인터뷰·유튜브를 보고 느낀 점 기록하기','동아리·팀 프로젝트에서 소통·리드 경험 쌓기','좋아하는 일을 SNS·블로그·영상으로 표현해보기'],
    grow:'재미를 좇다 시작한 일을 끝까지 못 맺을 수 있어요. 할 일을 작게 나눠 하나씩 마무리하는 습관과, 혼자 집중하는 시간을 함께 가지면 좋아요.',

(function build(){
  document.getElementById('score-list').innerHTML=ORDER.map(c=>{ const d=S[c];
    return `<div class="score-row" data-c="${c}"><div class="dot">${c[0]}</div>
      <div class="lab"><b>${c} · ${d.shortName} 엔진</b><span>${d.type}</span></div>
      <input id="sc-${c}" type="number" min="0" max="99" inputmode="numeric" enterkeyhint="next" placeholder="점수"
        oninput="onScoreInput(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();scoreNext(this);}"></div>`;}).join('');
})();
function scoreInputs(){ return ORDER.map(c=>document.getElementById('sc-'+c)); }
function scoreNext(el){ const a=scoreInputs(),i=a.indexOf(el);
  if(i>-1&&i<a.length-1){const n=a[i+1];n.focus();try{n.select();}catch(e){}} else if(i===a.length-1){el.blur();} }
function onScoreInput(el){ let v=el.value.replace(/[^0-9]/g,'').slice(0,2); if(v!==el.value)el.value=v;
  updateRemain(); if(v.length>=2) scoreNext(el); }
function updateRemain(){ let n=0; scoreInputs().forEach(el=>{if(el.value!==''&&!isNaN(parseInt(el.value)))n++;});
  document.getElementById('remain').textContent = n<4?`${4-n}색 점수가 남았어요 (${n}/4)`:'모두 입력 완료! 결과를 볼 수 있어요 🎉'; }

let LAST=null,_star=0,_fbImg=null;
function showResult(){
  const scores={}; let miss=null;
  for(const c of ORDER){ const el=document.getElementById('sc-'+c),v=parseInt(el.value,10);
    if(el.value===''||isNaN(v)){ if(!miss)miss=el; scores[c]=0; } else scores[c]=v; }
  if(miss){ toast('4색 엔진 점수를 모두 넣어주세요'); miss.focus(); return; }
  const ranked=[...ORDER].sort((a,b)=>scores[b]-scores[a]), top=ranked[0], d=S[top];
  const max=Math.max(...ORDER.map(c=>scores[c]),1); LAST={scores,ranked,top};
  const bars=ranked.map(c=>{ const s=scores[c],pct=Math.round(s/max*100);
    return `<div class="bar"><div class="bd" style="background:${S[c].color}">${c[0]}</div><div class="bt"><div class="n"><span>${c} · ${S[c].shortName}</span><span>${s}점</span></div><div class="track"><div class="fill" style="width:${pct}%;background:${S[c].color}"></div></div></div></div>`;}).join('');
  document.getElementById('s-result').innerHTML=`
    <div class="hero" style="background:linear-gradient(150deg,${d.color},${shade(d.color)})">
      <div class="kicker">나의 1순위 엔진</div><h2>${d.name}</h2>
      <div class="stitle">${d.type}</div><div class="quote">“${d.quote}”</div></div>
    <div class="card"><h2>🎨 나의 엔진 점수</h2>
      <p class="sub" style="margin-bottom:8px">1순위 <b>${d.shortName}</b> · 2순위 <b>${S[ranked[1]].shortName}</b> 조합이 나를 나타내요.</p>${bars}</div>
    <div class="card">
      <div class="sec"><h3>🧭 나의 성격</h3><p>${d.personality}</p><div class="chips act">${d.tags.map(t=>`<span>${t}</span>`).join('')}</div></div>
      <div class="sec"><h3>🌟 나의 강점</h3><ul>${d.strengths.map(x=>`<li>${x}</li>`).join('')}</ul></div>
    </div>
    <div class="card">
      <div class="sec"><h3>📚 나에게 맞는 공부·학습법</h3><p>${d.study}</p><ul class="mlist">${d.studyMethods.map(m=>`<li>${m}</li>`).join('')}</ul></div>
      <div class="sec"><h3>📝 과목별·시험 전략</h3><p>${d.subjectTips}</p><div class="tip">🗓️ 시험 대비 · ${d.examTip}</div></div>
    </div>
    <div class="card">
      <div class="sec"><h3>🎯 어울리는 진로·전공</h3><p>${d.majorWhy}</p><div class="chips">${d.majors.map(j=>`<span>${j}</span>`).join('')}</div><div style="margin-top:10px"><b style="font-size:14px">🎒 추천 활동</b><div class="chips act" style="margin-top:6px">${d.activities.map(a=>`<span>${a}</span>`).join('')}</div></div></div>
      <div class="sec"><h3>💭 진로 고민, 이렇게 풀어요</h3><div class="worry"><div class="q">${d.worryQ}</div><p>${d.worryA}</p></div></div>
      <div class="sec"><h3>✅ 지금 해보면 좋은 것</h3><ul class="nlist">${d.actions.map(a=>`<li>${a}</li>`).join('')}</ul></div>
      <div class="sec"><h3>🤝 친구·대인관계</h3><p>${d.friends}</p></div>
      <div class="sec"><h3>💗 성장 포인트</h3><p>${d.grow}</p></div>
      <div class="affirm">"${d.cheer}"</div>
      <div class="sec"><h3>📖 학문적 근거</h3><p style="font-size:13px;color:var(--soft)">PBS 컬러강점은 괴테 색채론·칼 융 분석심리학·막스 뤼셔 컬러심리·DISC 행동이론을 통합한 4엔진 모델입니다. 공부법 제안은 가드너의 다중지능·브루너 발견학습·비고츠키 사회적 학습을, 진로 탐색은 존 홀랜드(RIASEC) 진로이론·크럼볼츠의 계획된 우연을, 성장 관점은 캐럴 드웩의 성장 마인드셋을 참고했습니다.</p></div>
    </div>
    <div class="card no-print">
      <h2>💜 오늘 진단, 어땠나요?</h2>
      <p class="sub">별점과 소감을 남기면 결과를 PDF로 저장할 수 있어요 📄</p>
      <div class="field"><label>⭐ 별점</label><div class="stars" id="stars">${[1,2,3,4,5].map(n=>`<span data-n="${n}" onclick="setStar(${n})">★</span>`).join('')}</div></div>
      <div class="field"><label>💬 오늘 알게 된 점·느낀 점</label><textarea id="fb" placeholder="예: 내 강점과 어울리는 진로, 공부법을 알게 됐어요 :)"></textarea></div>
      <div class="field"><label>📷 사진 첨부 <span style="color:var(--muted);font-weight:600">(선택)</span></label><input type="file" accept="image/*" onchange="pickImg(this)"><div id="imgprev"></div></div>
      <button class="btn" onclick="savePDF()">📄 소감 남기고 결과 PDF 받기</button>
      <p class="hint">버튼을 누르면 인쇄 창이 열려요. "PDF로 저장"을 고르면 돼요.</p>
    </div>
    <div class="print-only" id="print-fb"></div>
    <div class="more no-print">
      <div class="k">MORE</div><h3>더 자세히 알고 싶다면</h3>
      <p>더 깊은 진단이나 진로·강점 코칭이 궁금하다면 이어가 보세요.</p>
      <a class="p" href="https://www.pbscolor.com" target="_blank" rel="noopener">🎨 최해숙 컬러강점 · 프로그램 보기</a>
      <a class="o" href="https://choisite.vercel.app/book48.html" target="_blank" rel="noopener">✨ 책 48문항 무료 진단</a>
    </div>
    <button class="btn ghost no-print" style="margin-top:14px" onclick="restart()">↺ 점수 다시 입력하기</button>
    <div class="foot">PBS 컬러강점 진로진단 · 학생용 · 최해숙 대표<br>본 진단은 자기 이해를 돕는 참고 도구예요.</div>`;
  document.getElementById('s-input').classList.remove('active');
  document.getElementById('s-result').classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
function shade(hex){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.round(r*.68);g=Math.round(g*.68);b=Math.round(b*.68);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }
function setStar(n){ _star=n; document.querySelectorAll('#stars span').forEach(s=>{s.style.color=(+s.dataset.n<=n)?'#F5A623':'#E3DFF0';}); }
function pickImg(input){ const f=input.files&&input.files[0]; if(!f)return; const img=new Image(),rd=new FileReader();
  rd.onload=e=>{img.onload=()=>{ const max=900; let w=img.width,h=img.height;
    if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    _fbImg=c.toDataURL('image/jpeg',.75); document.getElementById('imgprev').innerHTML=`<img src="${_fbImg}">`;
  };img.src=e.target.result;}; rd.readAsDataURL(f); }
function savePDF(){ const fb=(document.getElementById('fb').value||'').trim(), pf=document.getElementById('print-fb'), d=S[LAST.top];
  pf.innerHTML=`<div class="card"><h2>💜 나의 소감</h2><p style="font-size:13px;color:#524F6A">별점: ${'★'.repeat(_star||0)}${'☆'.repeat(5-(_star||0))}</p>${fb?`<p style="margin-top:6px;font-size:15px">${esc(fb)}</p>`:''}${_fbImg?`<img src="${_fbImg}" style="max-width:100%;max-height:300px;border-radius:12px;margin-top:8px">`:''}<p style="margin-top:10px;font-size:13px;color:#8A87A6">PBS 컬러강점 진로진단 · 나의 1순위 엔진은 ${d.name}!</p></div>`;
  toast('결과지를 PDF로 저장해요 📄'); setTimeout(()=>window.print(),350); }
function esc(s){ return s.replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function restart(){ document.getElementById('s-result').classList.remove('active');
  document.getElementById('s-input').classList.add('active');
  scoreInputs().forEach(el=>el.value='');_star=0;_fbImg=null;updateRemain(); window.scrollTo({top:0,behavior:'smooth'}); }
let _tt; function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('on'),2200); }
</script>
